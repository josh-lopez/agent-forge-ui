# Top-level areas for agent-forge-ui. Dev locks at this granularity so two Devs
# can work non-overlapping areas in parallel. BA matches issue scope → area:<name>
# labels using the paths globs below.

areas:
  ui:
    paths:
      - src/**
      - public/**
      - index.html
      - "*.html"

  build:
    paths:
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.*
      - "*.config.js"
      - "*.config.ts"

  docs:
    paths:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
      - "*.md"
      - spec/**
      - .agent-forge/**
