name: Deploy to GitHub Pages

# Deploys the production build to GitHub Pages on every push to main.
# The job only publishes if the build (and the tests it runs first) succeed —
# any failing step aborts the workflow before the deploy step runs.
on:
  push:
    branches:
      - main
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages.
# No additional secrets or deploy tokens are needed.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; queued runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        # Gate the deploy on a green test suite — never publish untested code.
        run: npm test

      - name: Build
        # VITE_BASE makes Vite emit asset URLs under the project-site sub-path
        # (https://<owner>.github.io/<repo>/). It is derived from the repo name.
        run: VITE_BASE="/${GITHUB_REPOSITORY#*/}/" npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
