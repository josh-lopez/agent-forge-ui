name: Deploy to GitHub Pages

# Deploys the production build to GitHub Pages on every push to main.
# The job only publishes if the build (and the tests it runs first) succeed —
# any failing step aborts the workflow before the deploy step runs.
on:
  push:
    branches:
      - main
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages.
# No additional secrets or deploy tokens are needed.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. We deliberately do NOT cancel an
# in-progress run: the actions/deploy-pages step errors out ("Canceling since a
# higher priority deployment request exists") when a queued run supersedes the
# one that is actively deploying, which turns the trunk red. Letting in-flight
# deploys finish (and queuing the next one) is GitHub's own recommended setting
# for Pages deployments.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        # Gate the deploy on a green test suite — never publish untested code.
        run: npm test

      - name: Configure GitHub Pages
        id: pages
        # We do NOT pass `enablement: true` here. That option makes the action
        # issue a repository-settings API call to turn Pages on, which the
        # default GITHUB_TOKEN is not permitted to do (it only carries
        # `pages: write`, not the `administration: write` scope required to
        # change repo settings). On this repo that call failed with
        # "Get Pages site failed" / "Resource not accessible by integration",
        # turning the trunk red. Pages must instead be enabled once, manually,
        # under Settings -> Pages -> "Build and deployment" -> Source:
        # "GitHub Actions" (a one-time manual step). configure-pages then reads
        # the existing site config so the build/upload/deploy steps can run.
        uses: actions/configure-pages@v5

      - name: Build
        # VITE_BASE makes Vite emit asset URLs under the project-site sub-path
        # (https://<owner>.github.io/<repo>/). It is derived from the repo name.
        run: VITE_BASE="/${GITHUB_REPOSITORY#*/}/" npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
